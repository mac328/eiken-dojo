057\u304B\u305F)\u3092\u542B\u3080\u7B54\u3048\u3002"},{no:2,type:"scene",q:"Please look at the five people. Tell me, as much as you can, what they are doing.",scene:["\u5C11\u5E74\u304C\u96FB\u8A71\u3067\u8A71\u3057\u3066\u3044\u308B","\u5C11\u5973\u304C\u97F3\u697D\u3092\u805E\u3044\u3066\u3044\u308B","\u7537\u6027\u304C\u30D1\u30BD\u30B3\u30F3\u3092\u4F7F\u3063\u3066\u3044\u308B","\u5973\u6027\u304C\u5199\u771F\u3092\u64AE\u3063\u3066\u3044\u308B","\u5C11\u5E74\u304C\u304B\u3070\u3093\u3092\u958B\u3051\u3066\u3044\u308B"],a:"A boy is talking on the phone. / A girl is listening to music. / A man is using a computer. / A woman is taking a picture. / A boy is opening his bag.",aJp:"listen to / talk on the phone \u306F\u524D\u7F6E\u8A5E\u3054\u3068\u3002",hint:"listening to music \u306Eto\u3092\u843D\u3068\u3055\u306A\u3044\u3002"},{no:3,type:"scene",q:"Now, look at the boy. Please describe the situation.",scene:["\u5C11\u5E74\u304C\u30B2\u30FC\u30E0\u3092\u3057\u305F\u3044\u304C\u3001\u5BBF\u984C\u304C\u7D42\u308F\u3063\u3066\u3044\u306A\u3044\u306E\u3067\u3067\u304D\u306A\u3044"],a:"He wants to play video games, but he can't because he hasn't finished his homework.",aJp:"\u30B2\u30FC\u30E0\u3057\u305F\u3044\u304C\u5BBF\u984C\u304C\u672A\u5B8C\u3002",hint:"hasn't finished(\u73FE\u5728\u5B8C\u4E86)\u304C\u4F7F\u3048\u308B\u3068\u52A0\u70B9\u5370\u8C61\u3002\u96E3\u3057\u3051\u308C\u3070 because he has homework \u3067\u3082\u901A\u3058\u308B\u3002"},{no:4,type:"opinion",q:"Do you think students should bring smartphones to school?",a:"No. Students may use them during class, so they can't listen to their teachers.",aJp:"\u3044\u3044\u3048\u3002\u6388\u696D\u4E2D\u306B\u4F7F\u3063\u3066\u3057\u307E\u3044\u5148\u751F\u306E\u8A71\u3092\u805E\u3051\u306A\u304F\u306A\u308B\u304B\u3089\u3067\u3059\u3002",hint:"No\u3067\u7B54\u3048\u308B\u7DF4\u7FD2\u3082\u3057\u3066\u304A\u304F\u3002may(\u301C\u304B\u3082\u3057\u308C\u306A\u3044)\u304C\u4FBF\u5229\u3002"},{no:5,type:"opinion",q:"How often do you use your smartphone?",a:"I use it every day, especially at night.",aJp:"\u6BCE\u65E5\u4F7F\u3044\u307E\u3059\u3002\u7279\u306B\u591C\u306B\u3002",hint:"How often \u306B\u306F\u983B\u5EA6\u3067\u7B54\u3048\u308B(every day / twice a week \u306A\u3069)\u3002\u4F1A\u8A71\u30EA\u30B9\u30CB\u30F3\u30B0\u65E2\u51FA\u30D1\u30BF\u30FC\u30F3\u3002"}]},{id:"i7",topic:"Libraries",passage:"Libraries are popular places for many people. People can read books and study there for free. Recently, some libraries have started to open cafes inside, and by doing so, they are trying to attract more visitors, especially young people.",passageJp:"\u56F3\u66F8\u9928\u306F\u591A\u304F\u306E\u4EBA\u306B\u4EBA\u6C17\u306E\u5834\u6240\u3060\u3002\u7121\u6599\u3067\u672C\u3092\u8AAD\u307F\u52C9\u5F37\u3067\u304D\u308B\u3002\u6700\u8FD1\u3001\u9928\u5185\u306B\u30AB\u30D5\u30A7\u3092\u958B\u304F\u3053\u3068\u3067\u3001\u7279\u306B\u82E5\u8005\u306A\u3069\u3088\u308A\u591A\u304F\u306E\u6765\u9928\u8005\u3092\u547C\u3073\u8FBC\u3082\u3046\u3068\u3059\u308B\u56F3\u66F8\u9928\u3082\u3042\u308B\u3002",note:"library \u306E\u8907\u6570\u5F62 libraries\u3002for free(\u7121\u6599\u3067)\u3002",qs:[{no:1,type:"passage",q:"According to the passage, how are some libraries trying to attract more visitors?",a:"By opening cafes inside.",aJp:"\u9928\u5185\u306B\u30AB\u30D5\u30A7\u3092\u958B\u304F\u3053\u3068\u306B\u3088\u3063\u3066\u3002",hint:"\u77ED\u304F\u3066OK\u3002By opening cafes. \u3067\u3082\u901A\u3058\u308B\u3002"},{no:2,type:"scene",q:"Please look at the five people. Tell me, as much as you can, what they are doing.",scene:["\u5973\u6027\u304C\u672C\u3092\u501F\u308A\u3066\u3044\u308B","\u7537\u6027\u304C\u968E\u6BB5\u3092\u4E0A\u3063\u3066\u3044\u308B","\u5C11\u5973\u304C\u7D75\u3092\u63CF\u3044\u3066\u3044\u308B","\u5C11\u5E74\u304C\u6905\u5B50\u306B\u5EA7\u3063\u3066\u3044\u308B","\u7537\u6027\u304C\u30B3\u30D4\u30FC\u3092\u53D6\u3063\u3066\u3044\u308B"],a:"A woman is borrowing a book. / A man is going up the stairs. / A girl is drawing a picture. / A boy is sitting on a chair. / A man is making a copy.",aJp:"borrow(\u501F\u308A\u308B)/ draw(\u63CF\u304F)\u3002",hint:"go up the stairs(\u968E\u6BB5\u3092\u4E0A\u308B)\u306F\u65B9\u5411\u306E\u524D\u7F6E\u8A5E\u3054\u3068\u3002"},{no:3,type:"scene",q:"Now, look at the man. Please describe the situation.",scene:["\u7537\u6027\u304C\u56F3\u66F8\u9928\u3067\u96FB\u8A71\u3057\u305F\u3044\u304C\u3001\u9928\u5185\u3067\u306F\u901A\u8A71\u7981\u6B62\u306A\u306E\u3067\u3067\u304D\u306A\u3044"],a:"He wants to talk on the phone, but he can't because using phones is not allowed in the library.",aJp:"\u901A\u8A71\u3057\u305F\u3044\u304C\u9928\u5185\u306F\u7981\u6B62\u3002",hint:"not allowed \u304C\u518D\u767B\u5834\u3002No.3\u306F\u3053\u306E\u578B\u306E\u53CD\u5FA9\u3002"},{no:4,type:"opinion",q:"Do you think libraries will be popular in the future?",a:"Yes. People can enjoy books and events for free.",aJp:"\u306F\u3044\u3002\u672C\u3084\u30A4\u30D9\u30F3\u30C8\u3092\u7121\u6599\u3067\u697D\u3057\u3081\u308B\u304B\u3089\u3067\u3059\u3002",hint:"for free(\u7121\u6599\u3067)\u306F\u7406\u7531\u3065\u304F\u308A\u306B\u4FBF\u5229\u3002"},{no:5,type:"opinion",q:"Do you often read books?",a:"Yes. I read books about cars and business.",aJp:"\u306F\u3044\u3002\u8ECA\u3084\u30D3\u30B8\u30CD\u30B9\u306E\u672C\u3092\u8AAD\u307F\u307E\u3059\u3002",hint:"about \u301C\u3067\u81EA\u5206\u306E\u8208\u5473\u5206\u91CE\u3092\u8A00\u3048\u3070\u5618\u306E\u306A\u3044\u7B54\u3048\u306B\u306A\u308B\u3002"}]},{id:"i8",topic:"Convenience Stores",passage:"There are many convenience stores in Japan, and they are open for long hours. People can buy food and drinks there at any time. Also, some convenience stores sell fresh vegetables from local farms, and in this way, they attract customers who care about their health.",passageJp:"日本にはコンビニが多く、長時間営業している。いつでも食べ物や飲み物が買える。また地元農場の新鮮な野菜を売ることで、健康に気を使う客を引きつけているコンビニもある。",note:"convenience / vegetables / customers はこのアプリの常連単語。",qs:[{no:1,type:"passage",q:"According to the passage, how do some convenience stores attract customers who care about their health?",a:"By selling fresh vegetables from local farms.",aJp:"地元農場の新鮮な野菜を売ることによって。",hint:"in this way の直前をBy -ingに。もう体が覚えてきたはず。"},{no:2,type:"scene",q:"Please look at the five people. Tell me, as much as you can, what they are doing.",scene:["女性が棚に商品を並べている","男性が雑誌を読んでいる","少年がアイスクリームを選んでいる","女性がコーヒーを注いでいる","男性がお金を払っている"],a:"A woman is putting products on the shelf. / A man is reading a magazine. / A boy is choosing ice cream. / A woman is pouring coffee. / A man is paying money.",aJp:"choose(選ぶ)/ pay(払う)の進行形。",hint:"paying money は単に paying でも通じる。"},{no:3,type:"scene",q:"Now, look at the woman. Please describe the situation.",scene:["女性が商品を買いたいが、財布を家に忘れてきたので買えない"],a:"She wants to buy something, but she can't because she left her wallet at home.",aJp:"買いたいが財布を忘れた。",hint:"left(leaveの過去形)=置き忘れた。日常あるあるで覚える。"},{no:4,type:"opinion",q:"Do you think convenience stores should be open 24 hours?",a:"No. Working at night is hard, so I think they should close at night.",aJp:"いいえ。夜勤は大変なので夜は閉めるべきだと思います。",hint:"労働の話は経営者として実感を込めて言える問題。YesでもNoでも理由があればOK。"},{no:5,type:"opinion",q:"How often do you go to convenience stores?",a:"I go there almost every day to buy coffee.",aJp:"ほぼ毎日コーヒーを買いに行きます。",hint:"How often→頻度。to buy 〜(〜を買うために)で目的を足すと語数が稼げる。"}]},{id:"i9",topic:"Traveling by Train",passage:"Many people in Japan travel by train. Trains usually come on time, so people can plan their trips easily. These days, some train companies sell special tickets with discounts for tourists, and by doing so, they encourage more people to enjoy traveling by train.",passageJp:"日本では多くの人が電車で旅行する。電車は時間通りに来るので計画が立てやすい。近年、観光客向けの割引切符を売ることで、より多くの人に電車の旅を楽しんでもらおうとする鉄道会社もある。",note:"on time(時間通りに・熟語既出)/ encourage(励ます・既出)が本文で再登場。",qs:[{no:1,type:"passage",q:"According to the passage, how do some train companies encourage more people to enjoy traveling by train?",a:"By selling special tickets with discounts for tourists.",aJp:"観光客向けの割引付き特別切符を売ることによって。",hint:"discount(割引)は仕事でも頻出のカタカナ語。"},{no:2,type:"scene",q:"Please look at the five people. Tell me, as much as you can, what they are doing.",scene:["男性が切符を買っている","女性がベンチで待っている","少女が電車に乗り込んでいる","男性が時刻表を見ている","女性が電話で話している"],a:"A man is buying a ticket. / A woman is waiting on the bench. / A girl is getting on the train. / A man is looking at the timetable. / A woman is talking on the phone.",aJp:"get on(乗り込む)は乗り物の基本熟語。",hint:"get on / get off(降りる)はセットで口に馴染ませる。"},{no:3,type:"scene",q:"Now, look at the man. Please describe the situation.",scene:["男性が電車に乗りたいが、ドアが閉まってしまって乗れない"],a:"He wants to get on the train, but he can't because the doors have just closed.",aJp:"乗りたいがドアが閉まった。",hint:"難しければ because the doors are closed. でも十分通じる。"},{no:4,type:"opinion",q:"Do you think traveling by train is better than traveling by car?",a:"No. I think cars are better because we can go anywhere at any time.",aJp:"いいえ。車ならいつでもどこへでも行けるので車の方が良いと思います。",hint:"車屋の意地を見せる問題。betterで聞かれたらbetterで返す。"},{no:5,type:"opinion",q:"Have you ever traveled by train with your family?",a:"Yes. We went to Tokyo by Shinkansen last year.",aJp:"はい。去年、新幹線で東京へ行きました。",hint:"Have you ever→Yes+過去形の1文。固有名詞(Shinkansen)で具体的に。"}]},{id:"i10",topic:"School Uniforms",passage:"In Japan, most junior high school students wear school uniforms. Uniforms are useful because students do not have to choose clothes every morning. However, buying uniforms costs a lot of money. Now, some schools collect old uniforms from graduates and give them to new students, and in this way, they help families save money.",passageJp:"日本ではほとんどの中学生が制服を着る。毎朝服を選ばなくてよいので便利だ。しかし制服の購入は高額だ。卒業生から古い制服を集めて新入生に譲ることで、家庭の節約を助ける学校もある。",note:"do not have to 〜(〜しなくてよい)/ save money(お金を節約する)。",qs:[{no:1,type:"passage",q:"According to the passage, how do some schools help families save money?",a:"By collecting old uniforms from graduates and giving them to new students.",aJp:"卒業生から古い制服を集めて新入生に渡すことによって。",hint:"長ければ By collecting old uniforms and giving them to new students. と短縮OK。"},{no:2,type:"scene",q:"Please look at the five people. Tell me, as much as you can, what they are doing.",scene:["少年が制服を着ている","少女がかばんに教科書を入れている","男性が黒板に書いている","少女が窓を拭いている","少年が友達と話している"],a:"A boy is wearing a school uniform. / A girl is putting textbooks in her bag. / A man is writing on the blackboard. / A girl is cleaning the window. / A boy is talking with his friend.",aJp:"wear(着ている状態)の進行形。",hint:"「着る動作」はput on、「着ている状態」はwear。ここはwearing。"},{no:3,type:"scene",q:"Now, look at the girl. Please describe the situation.",scene:["少女が教室に入りたいが、鍵がかかっていて入れない"],a:"She wants to enter the classroom, but she can't because the door is locked.",aJp:"入りたいが施錠されている。",hint:"locked(鍵がかかった)。万能フレームに乗せるだけ。"},{no:4,type:"opinion",q:"Do you think school uniforms are a good idea?",a:"Yes. Students don't have to think about clothes, so they can spend more time studying.",aJp:"はい。服を考えなくてよいので勉強に時間を使えます。",hint:"don't have to(〜しなくてよい)は理由づくりの強力な型。"},{no:5,type:"opinion",q:"What do you usually wear on weekends?",a:"I usually wear a T-shirt and jeans because they are comfortable.",aJp:"楽なのでたいていTシャツとジーンズです。",hint:"What系。comfortable(快適な・既出)で理由まで一気に。"}]},{id:"i11",topic:"Walking for Health",passage:"Walking is one of the easiest ways to stay healthy. People do not need any special equipment, and they can start at any time. Recently, some cities have made beautiful walking courses along rivers, and in this way, they encourage people to walk more in their daily lives.",passageJp:"ウォーキングは健康維持の最も手軽な方法の一つだ。特別な道具は不要でいつでも始められる。最近、川沿いに美しい遊歩道を整備することで、日常的にもっと歩くよう促す市もある。",note:"equipment(設備・既出)/ daily(毎日の)。one of the + 複数形も音読で慣れる。",qs:[{no:1,type:"passage",q:"According to the passage, how do some cities encourage people to walk more in their daily lives?",a:"By making beautiful walking courses along rivers.",aJp:"川沿いに美しいウォーキングコースを作ることによって。",hint:"along(〜に沿って)。勝山の川沿いを思い浮かべながら。"},{no:2,type:"scene",q:"Please look at the five people. Tell me, as much as you can, what they are doing.",scene:["男性が走っている","女性が犬と歩いている","少年が水を飲んでいる","女性がストレッチをしている","男性がベンチで休んでいる"],a:"A man is running. / A woman is walking with her dog. / A boy is drinking water. / A woman is stretching. / A man is resting on the bench.",aJp:"rest(休む)は動詞でも使える。",hint:"シンプルな5連発。テンポよく言い切る練習に最適。"},{no:3,type:"scene",q:"Now, look at the woman. Please describe the situation.",scene:["女性がジョギングしたいが、雪が積もっていてできない"],a:"She wants to go jogging, but she can't because there is a lot of snow.",aJp:"走りたいが雪が積もっている。",hint:"there is 〜(〜がある)で理由。福井の冬の実感で覚える。"},{no:4,type:"opinion",q:"Do you think people today get enough exercise?",a:"No. Many people sit for a long time at work, so they need to move more.",aJp:"いいえ。仕事で長時間座るので、もっと動く必要があります。",hint:"need to 〜(〜する必要がある)。自分にも刺さる話題ほど言葉が出やすい。"},{no:5,type:"opinion",q:"Do you do anything to stay healthy?",a:"Yes. I try to walk after dinner a few times a week.",aJp:"はい。週に数回、夕食後に歩くようにしています。",hint:"try to 〜(〜するよう心がける)は「完璧じゃないけどやってる」を表せる便利表現。"}]},{id:"i12",topic:"Foreign Tourists in Japan",passage:"Every year, many foreign tourists visit Japan. They enjoy Japanese food, temples, and beautiful nature. However, some tourists have trouble because they cannot read Japanese signs. Now, many towns put signs in several languages, and by doing so, they help foreign visitors travel more easily.",passageJp:"毎年多くの外国人観光客が日本を訪れる。日本食や寺、美しい自然を楽しむ。しかし日本語の標識が読めず困る観光客もいる。多言語の標識を設置することで、外国人が旅行しやすいよう助ける町が多い。",note:"foreign / several(いくつかの)は既出。have trouble(困る)。",qs:[{no:1,type:"passage",q:"According to the passage, how do many towns help foreign visitors travel more easily?",a:"By putting signs in several languages.",aJp:"複数の言語で標識を設置することによって。",hint:"in several languages(数か国語で)。severalが単語モードから回収される。"},{no:2,type:"scene",q:"Please look at the five people. Tell me, as much as you can, what they are doing.",scene:["女性が地図を見ている","男性が写真を撮っている","少女がお土産を買っている","男性がバスを待っている","女性が案内所で質問している"],a:"A woman is looking at a map. / A man is taking pictures. / A girl is buying souvenirs. / A man is waiting for a bus. / A woman is asking a question at the information center.",aJp:"wait for 〜(〜を待つ)は前置詞ごと。",hint:"souvenir(お土産)は言えなくてもpresentsで代用可。止まらないことが大事。"},{no:3,type:"scene",q:"Now, look at the man. Please describe the situation.",scene:["男性がレストランに入りたいが、満席で入れない"],a:"He wants to eat at the restaurant, but he can't because it is full.",aJp:"入りたいが満席。",hint:"full(満席・満車)は本当に万能。2回目の登場。"},{no:4,type:"opinion",q:"Do you think more foreign tourists will visit Japan in the future?",a:"Yes. Japanese food and culture are popular around the world.",aJp:"はい。日本食と文化は世界中で人気だからです。",hint:"around the world(世界中で)を足すだけで文が立派になる。"},{no:5,type:"opinion",q:"Have you ever talked with people from other countries?",a:"Yes. I sometimes talk with foreign customers at my shop.",aJp:"はい。店で外国のお客様と話すことがあります。",hint:"実体験そのままでOK。at my shop が言えたら面接官の印象も良い。"}]},{id:"i13",topic:"Online Learning",passage:"These days, many people study online. They can take lessons at home, so they do not need to spend time going to school. Also, some websites let students watch the same lesson many times, and in this way, they help students understand difficult points at their own pace.",passageJp:"近年、多くの人がオンラインで学ぶ。自宅で授業を受けられるので通学時間が不要だ。同じ授業を何度も見られるようにすることで、難しい点を自分のペースで理解できるよう助けるサイトもある。",note:"at their own pace(自分のペースで)。let 人 動詞(〜させてあげる)。",qs:[{no:1,type:"passage",q:"According to the passage, how do some websites help students understand difficult points at their own pace?",a:"By letting students watch the same lesson many times.",aJp:"同じ授業を何度も見られるようにすることによって。",hint:"By letting 人 動詞。Online Shoppingのカードと同じ形の再登場。"},{no:2,type:"scene",q:"Please look at the five people. Tell me, as much as you can, what they are doing.",scene:["少女がパソコンで勉強している","男性がヘッドホンをつけている","女性がノートに書いている","少年が辞書を使っている","女性がお茶を飲んでいる"],a:"A girl is studying on the computer. / A man is wearing headphones. / A woman is writing in her notebook. / A boy is using a dictionary. / A woman is drinking tea.",aJp:"on the computer(パソコンで)。",hint:"まさに今のミツヤさんの学習風景。自分事として描写する。"},{no:3,type:"scene",q:"Now, look at the boy. Please describe the situation.",scene:["少年が動画を見たいが、インターネットが遅くて見られない"],a:"He wants to watch a video, but he can't because the Internet is too slow.",aJp:"見たいが回線が遅い。",hint:"too + 形容詞(あまりに〜すぎる)。too slow / too expensive は頻出。"},{no:4,type:"opinion",q:"Do you think studying online is as good as studying at school?",a:"No. At school, students can ask their teachers questions easily.",aJp:"いいえ。学校なら先生にすぐ質問できるからです。",hint:"as good as(同じくらい良い)で聞かれても、Yes/No+理由の型は同じ。"},{no:5,type:"opinion",q:"Do you use the Internet to learn something?",a:"Yes. I study English online every day with a learning app.",aJp:"はい。学習アプリで毎日オンラインで英語を勉強しています。",hint:"この答えは今のミツヤさんの真実そのもの。本番でそのまま使える。"}]},{id:"i14",topic:"Summer Festivals",passage:"Summer festivals are popular events in Japan. People enjoy watching fireworks and eating food at the stalls. However, some small towns cannot hold festivals because they do not have enough money. Some towns ask local companies for help, and in this way, they keep their traditional events alive.",passageJp:"夏祭りは日本で人気の行事だ。花火や屋台の食べ物を楽しむ。しかし資金不足で祭りを開けない小さな町もある。地元企業に協力を求めることで、伝統行事を守り続けている町もある。",note:"hold(開催する)/ traditional(伝統的な・既出)/ keep 〜 alive(〜を存続させる)。",qs:[{no:1,type:"passage",q:"According to the passage, how do some towns keep their traditional events alive?",a:"By asking local companies for help.",aJp:"地元企業に協力を求めることによって。",hint:"ask 〜 for help(〜に助けを求める)。local(地元の)も既出単語。"},{no:2,type:"scene",q:"Please look at the five people. Tell me, as much as you can, what they are doing.",scene:["男性が焼きそばを作っている","少女が金魚すくいをしている","女性が浴衣を着て歩いている","少年がかき氷を食べている","男性が太鼓をたたいている"],a:"A man is cooking fried noodles. / A girl is catching goldfish. / A woman in a yukata is walking. / A boy is eating shaved ice. / A man is playing the drum.",aJp:"日本文化の語はそのままでOK(yukata等)。",hint:"言えない固有名詞は無理せず、動作(cooking/eating/playing)を確実に。"},{no:3,type:"scene",q:"Now, look at the girl. Please describe the situation.",scene:["少女が花火を見たいが、人が多すぎてよく見えない"],a:"She wants to watch the fireworks, but she can't see them well because there are too many people.",aJp:"見たいが人が多すぎる。",hint:"too many people(人が多すぎる)。tooの使い方2連発で定着させる。"},{no:4,type:"opinion",q:"Do you think it is important to keep traditional events?",a:"Yes. Traditional events bring people in the town together.",aJp:"はい。伝統行事は町の人々を結びつけるからです。",hint:"bring 〜 together(〜を結びつける)。地域の商売人として実感を乗せて。"},{no:5,type:"opinion",q:"Do you like summer festivals?",a:"Yes. I go to the local festival with my children every year.",aJp:"はい。毎年子どもたちと地元の祭りに行きます。",hint:"with my children が言えると家族の話題(No.5頻出)に応用が利く。"}]},{id:"i15",topic:"Bicycles",passage:"Bicycles are useful for short trips. They do not need gasoline, and riding them is good exercise. In some cities, people can borrow bicycles at stations for a small fee. In this way, the cities help people move around town without using cars.",passageJp:"自転車は近距離の移動に便利だ。ガソリンが不要で運動にもなる。駅で少額の料金で自転車を借りられる市もある。こうして市は車を使わずに移動できるよう手助けしている。",note:"borrow(借りる)/ fee(料金)は既出。without -ing(〜せずに)。",qs:[{no:1,type:"passage",q:"According to the passage, how do some cities help people move around town without using cars?",a:"By letting people borrow bicycles at stations for a small fee.",aJp:"駅で少額の料金で自転車を貸し出すことによって。",hint:"シェアサイクルの話。fee(料金)が単語モードから回収される。"},{no:2,type:"scene",q:"Please look at the five people. Tell me, as much as you can, what they are doing.",scene:["男性が自転車を修理している","少女がヘルメットをかぶっている","女性が自転車を押して歩いている","少年が自転車に鍵をかけている","男性が地図アプリを見ている"],a:"A man is repairing a bicycle. / A girl is wearing a helmet. / A woman is walking with her bicycle. / A boy is locking his bicycle. / A man is looking at a map app.",aJp:"repair(修理する)は本業ど真ん中の単語。",hint:"repairing はミツヤさんの毎日。一番言いやすい1文のはず。"},{no:3,type:"scene",q:"Now, look at the woman. Please describe the situation.",scene:["女性が自転車で出かけたいが、タイヤがパンクしていて乗れない"],a:"She wants to ride her bicycle, but she can't because the tire is flat.",aJp:"乗りたいがタイヤがパンク。",
